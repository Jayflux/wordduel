events {
    worker_connections 1024;
}

http {
    # Include MIME types so CSS/JS are served correctly
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # Upstream: Login Service with Round-Robin + Failover
    upstream auth_servers {
        server login-service-1:4001 max_fails=2 fail_timeout=10s;
        server login-service-2:4001 max_fails=2 fail_timeout=10s;
    }

    server {
        listen 80;
        server_name _;

        # ── Static Frontend ──────────────────────────────────
        location / {
            root  /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # ── Auth Service (Login / Register) ──────────────────
        # Browser calls: /api/auth/login  →  login-service:/login
        location /api/auth/ {
            proxy_pass         http://auth_servers/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_connect_timeout 5s;
            proxy_read_timeout    10s;
        }

        # ── User Service ─────────────────────────────────────
        # Browser calls: /api/users/...  →  user-service:/...
        location /api/users/ {
            proxy_pass         http://user-service:4002/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        # ── Matchmaking Service ──────────────────────────────────
        # /api/matchmaking/join        → long-poll join queue
        # /api/matchmaking/leave       → cancel queue
        # /api/matchmaking/queue/status → live queue stats
        location /api/matchmaking/ {
            proxy_pass         http://matchmaking-service:4005/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 90s;   # queue timeout is 60s, add buffer
            proxy_buffering    off;   # important for real-time status
        }

        # ── Ranking / Leaderboard Service ────────────────────
        # Browser calls: /api/leaderboard/...  →  ranking-service:/...
        location /api/leaderboard/ {
            proxy_pass         http://ranking-service:4003/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        # ── WebSocket (Socket.io) ─────────────────────────────
        location /socket.io/ {
            proxy_pass              http://chat-service:4004/socket.io/;
            proxy_http_version      1.1;
            proxy_set_header        Upgrade     $http_upgrade;
            proxy_set_header        Connection  "Upgrade";
            proxy_set_header        Host        $host;
            proxy_set_header        X-Real-IP   $remote_addr;
            proxy_read_timeout      86400s;   # keep WS alive
            proxy_send_timeout      86400s;
        }
    }
}
